<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Israel Travel Map</title>
  <link rel="stylesheet" href="style.css?v=2" />
</head>
<body>

  <!-- Top bar -->
  <header class="topbar">
    <div class="search-wrap">
      <input id="search-input" type="text" placeholder="Search for a place in Israel…" autocomplete="off" />
    </div>
    <button id="sidebar-toggle" class="sidebar-toggle" aria-label="Show locations list">
      <svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round">
        <line x1="3" y1="7" x2="21" y2="7"/><line x1="3" y1="12" x2="21" y2="12"/><line x1="3" y1="17" x2="21" y2="17"/>
      </svg>
      <span id="toggle-count">0</span>
    </button>
    <div class="filter-chips">
      <button class="chip active" data-filter="all">All</button>
      <button class="chip" data-filter="visited">✓ Visited</button>
      <button class="chip" data-filter="plan">★ Plan</button>
      <button class="chip" data-filter="favorite">♥ Favorite</button>
      <button class="chip" data-filter="wont">✕ Won't</button>
      <button id="btn-directions" class="chip directions-chip">&#x2192; Directions</button>
    </div>
  </header>

  <!-- ── Directions Bar (multi-stop) ── -->
  <div id="directions-bar" class="directions-bar hidden">
    <!-- Shortcuts row -->
    <div class="dir-shortcuts">
      <button id="dir-my-location" class="dir-shortcut-btn">📍 My Location</button>
      <div id="dir-home-btns" class="dir-home-btns"></div>
      <button id="dir-manage-homes" class="dir-btn dir-btn-homes">⚙ Homes</button>
      <button id="dir-add-stop" class="dir-btn">+ Stop</button>
      <button id="dir-clear" class="dir-btn dir-btn-clear">✕ Clear</button>
    </div>
    <!-- Dynamic stops list -->
    <div id="dir-stops-list" class="dir-stops-list"></div>
    <!-- Footer: summary + nav buttons + hint -->
    <div class="dir-footer">
      <span id="dir-summary" class="dir-summary"></span>
      <button id="dir-google-maps" class="dir-btn dir-btn-nav hidden">Google Maps</button>
      <button id="dir-waze" class="dir-btn dir-btn-nav hidden">Waze</button>
      <span id="dir-hint" class="dir-hint">Click a pin on the map to set a stop.</span>
    </div>
  </div>

  <!-- Main content -->
  <div class="main">
    <div id="sidebar-backdrop" class="sidebar-backdrop"></div>

    <!-- Sidebar -->
    <aside class="sidebar">

      <!-- Mobile-only header row -->
      <div class="sidebar-mobile-header">
        <span class="sidebar-title">Travel Map</span>
        <button id="sidebar-close" class="sidebar-close" aria-label="Close">✕</button>
      </div>

      <!-- Tabs -->
      <div class="sidebar-tabs">
        <button class="tab active" data-tab="locations">📍 Locations</button>
        <button class="tab" data-tab="itinerary">🗓 Itinerary</button>
        <button class="tab" data-tab="notes">📝 Notes</button>
      </div>

      <!-- ── Locations Tab ── -->
      <div id="tab-locations" class="tab-panel">
        <div class="stats-row">
          <div class="stat">
            <div class="stat-num" id="stat-total">0</div>
            <div class="stat-label">TOTAL</div>
          </div>
          <div class="stat">
            <div class="stat-num stat-visited" id="stat-visited">0</div>
            <div class="stat-label">VISITED</div>
          </div>
          <div class="stat">
            <div class="stat-num stat-plan" id="stat-planned">0</div>
            <div class="stat-label">PLANNED</div>
          </div>
        </div>
        <button id="add-location-btn" class="add-btn">+ Add New Location</button>
        <ul id="location-list"></ul>
      </div>

      <!-- ── Itinerary Tab ── -->
      <div id="tab-itinerary" class="tab-panel hidden">
        <button id="add-trip-btn" class="add-btn">+ New Trip</button>
        <div id="itinerary-list"></div>
      </div>

      <!-- ── Notes Tab ── -->
      <div id="tab-notes" class="tab-panel hidden">
        <button id="add-list-btn" class="add-btn">+ New List</button>
        <div id="notes-list"></div>
      </div>

    </aside>

    <!-- Map -->
    <div id="map"></div>
  </div>

  <!-- ── Add/Edit Location Modal ── -->
  <div id="modal-overlay" class="modal-overlay hidden">
    <div class="modal">
      <div class="modal-drag-handle"></div>
      <h2 id="modal-title">Add Location</h2>
      <div class="modal-field">
        <label>Name</label>
        <input id="modal-name" type="text" readonly />
      </div>
      <div class="modal-field">
        <label>Category</label>
        <select id="modal-category">
          <option value="">— None —</option>
          <option value="Nature / Hiking">Nature / Hiking</option>
          <option value="Beach">Beach</option>
          <option value="City / Town">City / Town</option>
          <option value="Food &amp; Restaurants">Food &amp; Restaurants</option>
          <option value="Religious / Historical">Religious / Historical</option>
          <option value="Parking / Trailhead">Parking / Trailhead</option>
          <option value="Accommodation">Accommodation</option>
          <option value="Shopping">Shopping</option>
          <option value="Viewpoint">Viewpoint</option>
          <option value="Museum / Culture">Museum / Culture</option>
          <option value="Other">Other</option>
        </select>
      </div>
      <div class="modal-field">
        <label>Status</label>
        <div class="status-radios">
          <label class="radio-label visited"><input type="radio" name="status" value="visited" /> ✓ Visited</label>
          <label class="radio-label plan"><input type="radio" name="status" value="plan" /> ★ Plan to Visit</label>
          <label class="radio-label wont"><input type="radio" name="status" value="wont" /> ✕ Won't Visit</label>
          <label class="radio-label favorite"><input type="radio" name="status" value="favorite" /> ♥ Favorite</label>
        </div>
      </div>
      <div class="modal-field">
        <label for="modal-notes">Notes</label>
        <textarea id="modal-notes" rows="3" placeholder="Add any notes about this place…"></textarea>
      </div>
      <!-- Place details fetched from Google Places API -->
      <div id="place-details-section" class="place-details-section hidden"></div>

      <div class="modal-actions">
        <button id="modal-save" class="btn-primary">Save</button>
        <button id="modal-delete" class="btn-danger hidden">Delete</button>
        <button id="modal-cancel" class="btn-secondary">Cancel</button>
      </div>
    </div>
  </div>

  <!-- ── Trip Modal ── -->
  <div id="trip-modal-overlay" class="modal-overlay hidden">
    <div class="modal">
      <div class="modal-drag-handle"></div>
      <h2 id="trip-modal-title">New Trip</h2>
      <div class="modal-field">
        <label>Trip Name</label>
        <input id="trip-name" type="text" placeholder="e.g. Dead Sea Weekend" />
      </div>
      <div class="modal-field">
        <label>Main Destination</label>
        <input id="trip-destination" type="text" placeholder="Search anywhere in the world…" autocomplete="off" />
      </div>
      <div class="modal-field modal-field-row">
        <div>
          <label>Start Date</label>
          <input id="trip-start-date" type="date" />
        </div>
        <div>
          <label>End Date</label>
          <input id="trip-end-date" type="date" />
        </div>
      </div>
      <div class="modal-field">
        <label>Notes</label>
        <textarea id="trip-notes" rows="2" placeholder="Any general notes for this trip…"></textarea>
      </div>
      <div class="modal-actions">
        <button id="trip-modal-save" class="btn-primary">Save Trip</button>
        <button id="trip-modal-cancel" class="btn-secondary">Cancel</button>
      </div>
    </div>
  </div>

  <!-- ── Add Trip Item Modal ── -->
  <div id="trip-item-modal-overlay" class="modal-overlay hidden">
    <div class="modal">
      <div class="modal-drag-handle"></div>
      <h2>Add Place to Trip</h2>
      <div class="modal-field">
        <label>Place (search worldwide)</label>
        <input id="trip-item-place" type="text" placeholder="Search Google Maps…" autocomplete="off" />
      </div>
      <div class="modal-field modal-field-row">
        <div>
          <label>Date</label>
          <input id="trip-item-date" type="date" />
        </div>
        <div>
          <label>Category</label>
          <select id="trip-item-category">
            <option value="">— None —</option>
            <option value="Nature / Hiking">Nature / Hiking</option>
            <option value="Beach">Beach</option>
            <option value="City / Town">City / Town</option>
            <option value="Food &amp; Restaurants">Food &amp; Restaurants</option>
            <option value="Religious / Historical">Religious / Historical</option>
            <option value="Parking / Trailhead">Parking / Trailhead</option>
            <option value="Accommodation">Accommodation</option>
            <option value="Shopping">Shopping</option>
            <option value="Viewpoint">Viewpoint</option>
            <option value="Museum / Culture">Museum / Culture</option>
            <option value="Other">Other</option>
          </select>
        </div>
      </div>
      <div class="modal-field">
        <label>Notes</label>
        <textarea id="trip-item-notes" rows="2" placeholder="e.g. Book in advance, bring sunscreen…"></textarea>
      </div>
      <div class="modal-actions">
        <button id="trip-item-save" class="btn-primary">Add Place</button>
        <button id="trip-item-cancel" class="btn-secondary">Cancel</button>
      </div>
    </div>
  </div>

  <!-- ── Homes Management Modal ── -->
  <div id="homes-modal-overlay" class="modal-overlay hidden">
    <div class="modal">
      <div class="modal-drag-handle"></div>
      <h2>Home Locations</h2>
      <p class="homes-modal-desc">Saved homes appear as quick-add shortcuts in the directions panel.</p>
      <div id="homes-list" class="homes-list"></div>
      <div class="homes-add-form">
        <div class="modal-field">
          <label>Label (e.g. My Home)</label>
          <input id="home-label-input" type="text" placeholder="My Home" maxlength="20" />
        </div>
        <div class="modal-field">
          <label>Address / Place (search worldwide)</label>
          <input id="home-place-input" type="text" placeholder="Search for your home address…" autocomplete="off" />
        </div>
        <button id="home-add-btn" class="btn-primary">Save Home Location</button>
      </div>
      <div class="modal-actions" style="margin-top:16px">
        <button id="homes-close-btn" class="btn-secondary">Close</button>
      </div>
    </div>
  </div>

  <script src="app.js?v=2"></script>
  <script
    src="https://maps.googleapis.com/maps/api/js?key=AIzaSyBYh0vnLLnZb8G0GOzxWNSRpnJfPPvDZ6I&libraries=places&callback=initMap"
    async defer>
  </script>
</body>
</html>
